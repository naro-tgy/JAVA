<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // 1.일정시간 이후에 한번만 자동 호출되는 타이머함수
        // setTimeout(()=>{},시간값);
        // 2.일정시간 마다 계속 반복 자동 호출되는 타이머함수
        // setInterval(()=>{},시간값);
        // setTimeout(()=>{
            // document.write('나는 한번만')
        // },1000)
        // => 시간값 : 밀리세컨드 1초가 1000, 2초 2000, 0.5초 
        // setTimeout의 정지, 삭제시
        // clearTimeout(id)
        // => id : setTimeout을 저장한 변수명
        // setInterval(()=>{
            // document.write('나는 계속<br>')
        // },1000)
        // setInterval의 정지, 삭제시
        // clearInterval(id)
        // => id : setInterval을 저장한 변수명

        let si=setInterval(()=>{
            document.write("출력<br>")
        },1000)

        setTimeout(()=>{
            clearInterval(si)
        },5000)
    </script>
</body>
</html>
