<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .clock {
            width: 400px;
            height: 400px;
            background-color: lab(39.17% 10.79 -46.31);
            border-radius: 200px;
            position: relative;
        }

        .clock>div {
            position: absolute;
            transform-origin: bottom;
        }
        .linehour {
            width: 10PX;
            height: 100px;
            background-color: white;
            top: calc(50% - 100px);
            left: calc(50% - 5px);
        }
        .linemin{
            width: 4px;
            height: 200px;
            background-color: aquamarine;
            top: calc(50% - 200px);
            left: calc(50% - 2px);

        }
        .linesec{
            width: 2px;
            height: 200px;
            background-color: burlywood;
            top: calc(50% - 200px);
            left:  calc(50% - 1px);
        }
    </style>
</head>
<body>
    <div class="clock">
        <div class="linehour"></div>
        <div class="linemin"></div>
        <div class="linesec"></div>
    </div>
    <script>
        function clock_f(){
            // 1.객체 선택하기
            const lineHour=document.querySelector('.linehour')
            const lineMin=document.querySelector('.linemin')
            const lineSec=document.querySelector('.linesec')
            // 2.시간값 가지고 오기
            let now=new Date();
            let h=now.getHours();
            let m=now.getMinutes();
            let s=now.getSeconds();
            // 3.시계바늘 각도값 계산
            let h_deg=h*(360/12)+m*(360/12/60);
            let m_deg=m*(360/60);
            let s_deg=s*(360/60);
            
            // 4.각도값으로 각 시계바늘을 회전 시키기
            lineHour.style.transform=`rotateZ(${h_deg}deg)`;
            lineMin.style.transform=`rotateZ(${m_deg}deg)`;
            lineSec.style.transform=`rotateZ(${s_deg}deg)`;
        }
        // 1. 초기 로드시 호출영역
        clock_f();
        //2.1초에 한번씩 새로운값 호출
        setInterval(()=>{
            clock_f();
        },1000)
    </script>
</body>
</html>
