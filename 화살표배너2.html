<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .mask_box {
            width: 800px;
            height: 400px;
            border: 10px solid black;
            position: relative;
            margin: 50px auto;
        }

        .move_box {
            width: calc(800px * 5);
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            display: flex;

        }

        .img_box {
            width: 800px;
            height: 400px;
            font-size: 100px;
            text-align: center;
            background-color: aquamarine;
        }

        .but {
            font-size: 50px;
            position: absolute;
            top: calc(50% - 25px);
        }

        #left_but {
            left: 0;
        }

        #right_but {
            right: 0;
        }
        .box {
            width: 300px;
            height: 300px;
            border: 10px solid black;
            position: relative;
            top: 0;
            left: 0;
        }
    </style>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script>
        $(document).ready(function(){
            // // let click_num=0
            // $('#left_but').click(function(){
            //     click_num--;
            //     // 1, 2, 3, 4 ~
            //     if(click_num<=0){
            //         click_num=0;
            //     }
            //     $('.move_box').animate({
            //         left:-800*click_num
            //     },500)
            // })


            // $('#right_but').click(function(){
            //     click_num++;
            //     // 1, 2, 3, 4 ~
            //     if(click_num>4){
            //         click_num=4;
            //     }
            //     $('.move_box').animate({
            //         left:-800*click_num
            //     },500,function(){

            //     })
            // })


            $('right_box').click(function(){
                // 1.가장 마지막에 있는 img_box가 앞으로 오기
                
                // 2.이미지를 이동할 영역을 만들어 주기
                // 3.왼쪽으로 움직이게 만들기
                })
            $('right_box').click(function(){
                $('.move_box').animate({
                    left:-800
                },500,function(){
                    $('.img_box').first().appendTo('.move_box');
                    $('.move_box').css({
                        left:0
                    })
                })
            })
            // $('.box').click(function(){
            //     $(this).animate({
            //         left:400
            //     },1000,function(){
            //         // animate가 완전히 끝난 다음 실행하는 영역
            //         $(this).animate({
            //             width:50
                        
            //         },1000)
            //     })
            // })

        }) // 끝
    </script>
</head>

<body>
    <div class="mask_box">
        <div class="move_box">
            <div class="img_box">1</div>
            <div class="img_box">2</div>
            <div class="img_box">3</div>
            <div class="img_box">4</div>
            <div class="img_box">5</div>
        </div>
        <button class="but" id="left_but">&lt;</button>
        <button class="but" id="right_but">&gt;</button>
    </div>
    <div class="box"></div>
</body>

</html>
